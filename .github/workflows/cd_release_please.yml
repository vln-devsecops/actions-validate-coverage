name: Release Please

on:
  push:
    branches:
      - main # Assuming main is the primary branch

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Update action.yml version
        if: steps.release.outputs.release_created
        run: |
          VERSION_TAG="${{ steps.release.outputs.tag_name }}"
          # Update action.yml version for Docker image tag
          sed -i "s/^\(\s*image:\s*docker:\/\/ghcr.io\/vln-devsecops\/actions-validate-coverage:\).*/\1$VERSION_TAG/" action.yml
          git config user.name "OpenClaw"
          git config user.email "openclaw@example.com"
          git add action.yml
          git commit -m "CI: Update action.yml version according to release-please"
          git push origin add-release-please
          gh pr create --base main --head add-release-please --title "CI: Add release-please automation" --body "This PR adds release-please configuration to automate versioning and releases for action.yml." --repo vln-devsecops/actions-validate-coverage
