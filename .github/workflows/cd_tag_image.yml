name: Tag Image

on:
  push:
    # Only the full three-part semver tag triggers this workflow.
    # Pushing vX and vX.Y at the same time will not cause extra runs.
    tags: ['v[0-9]*.[0-9]*.[0-9]*']

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: vln-devsecops/actions-validate-coverage

permissions:
  contents: write
  packages: write

jobs:
  tag-image:
    name: Promote image to release tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # For annotated tags github.sha is the tag-object SHA, not the commit.
      # git rev-list always returns the commit SHA regardless of tag type.
      - name: Resolve commit SHA
        id: sha
        run: |
          COMMIT_SHA=$(git rev-list -n 1 "${{ github.ref_name }}")
          echo "short=${COMMIT_SHA:0:7}" >> "$GITHUB_OUTPUT"
          echo "full=${COMMIT_SHA}" >> "$GITHUB_OUTPUT"

      # Only move `latest` if this tag is the highest semver in the repo.
      # This protects against out-of-order tagging (e.g. backporting a patch
      # to an older major while a newer major already exists).
      - name: Check if this is the highest release
        id: check_latest
        run: |
          CURRENT="${{ github.ref_name }}"
          HIGHEST=$(git tag -l \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
            | sort -V | tail -1)
          echo "current=${CURRENT}, highest=${HIGHEST}"
          if [ "${CURRENT}" = "${HIGHEST}" ]; then
            echo "is_latest=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_latest=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract release metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: |
            latest=${{ steps.check_latest.outputs.is_latest }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull source image
        run: |
          SOURCE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ steps.sha.outputs.short }}"
          echo "Source image: ${SOURCE}"
          docker pull "${SOURCE}"

      # Test the image that will be promoted before applying any release tags.
      - name: Test source image
        uses: ./.github/actions/test-docker
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ steps.sha.outputs.short }}

      - name: Apply release tags
        run: |
          SOURCE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ steps.sha.outputs.short }}"
          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            echo "Tagging: ${tag}"
            docker tag "${SOURCE}" "${tag}"
            docker push "${tag}"
          done <<< "${{ steps.meta.outputs.tags }}"
